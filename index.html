<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCES 2026 – Programm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gces-orange:  #FF5139;
  --gces-violet:  #4B0346;
  --gces-pink:    #F0A0E0;
  --gces-pink-lt: #FAD4F4;
  --gces-pink-md: #D468C0;
  --accent:      #FF5139;
  --accent-dim:  rgba(255,81,57,0.12);
  --violet:      #4B0346;
  --pink:        #F0A0E0;
  --c-k6:        #FF5139;
  --c-k4:        #4B0346;
  --c-k2:        #9B3AA8;
  --c-p1:        #C05820;
  --c-foyer:     #A04898;
  --c-alabama:   #8B1A84;
  --c-policy:    #4B0346;
  --c-markets:   #FF5139;
  --c-futures:   #C653B8;
  --c-impact:    #F0A0E0;
  --radius: 10px;
  --tr: 0.17s ease;
}
[data-theme="dark"] {
  --bg:         #120010;
  --bg2:        #1e0018;
  --bg3:        #2a0022;
  --border:     rgba(240,160,224,0.12);
  --text:       #f8eef8;
  --text2:      #c090b8;
  --text3:      #b070a0;
  --sidebar-bg: #0a000a;
  --accent-text: #FF5139;
}
[data-theme="light"] {
  --bg:         #f8f0f8;
  --bg2:        #ffffff;
  --bg3:        #efefef;
  --border:     rgba(75,3,70,0.1);
  --text:       #000000;
  --text2:      #4B0346;
  --text3:      #624060;
  --sidebar-bg: #4B0346;
  --accent-text: #CC3520;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
  transition: background .25s, color .25s;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
.sidebar {
  width: 210px; background: var(--sidebar-bg);
  position: fixed; top: 0; left: 0; bottom: 0;
  display: flex; flex-direction: column; z-index: 200;
  overflow-y: auto;
}
.sidebar-logo { padding: 22px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.logo-eyebrow { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.logo-name { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: #fff; line-height: 1.35; }
.logo-sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.sb-section { padding: 14px 10px 4px; }
.sb-label { font-size: 9px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
.sb-btn {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 7px 10px; border-radius: 8px; color: rgba(255,255,255,0.5);
  font-size: 12px; font-weight: 400; text-align: left; transition: var(--tr); margin-bottom: 1px;
}
.sb-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
.sb-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
.sb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.track-btn {
  display: flex; align-items: center; gap: 7px; width: 100%;
  padding: 6px 10px; border-radius: 7px; color: rgba(255,255,255,0.45);
  font-size: 11px; transition: var(--tr); margin-bottom: 1px;
}
.track-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); }
.track-btn.active { color: rgba(255,255,255,0.85); }
.track-btn .tck { font-size: 9px; margin-left: auto; opacity: 0; }
.track-btn.active .tck { opacity: 1; }
.sb-bottom {
  margin-top: auto; padding: 12px 14px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between;
}
.sb-clock { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .04em; }
.theme-btn { background: rgba(255,255,255,0.08); border-radius: 6px; padding: 5px 9px; font-size: 12px; color: rgba(255,255,255,0.5); transition: var(--tr); }
.theme-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
.main-area { margin-left: 210px; }
.d-topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 14px 22px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.d-day-label { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); }
.d-stage-label { font-size: 12px; color: var(--text3); }
.d-fav-btn {
  margin-left: auto; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border); font-size: 12px; color: var(--text2); transition: var(--tr);
}
.d-fav-btn:hover, .d-fav-btn.has-favs { border-color: var(--accent); color: var(--accent); }
.d-grid { padding: 18px 20px 60px; }
.stage-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
}
@media (max-width: 1400px) { .stage-grid[data-cols="6"], .stage-grid[data-cols="5"], .stage-grid[data-cols="4"] { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 1150px) { .stage-grid { grid-template-columns: repeat(2, 1fr) !important; } }
@media (max-width: 980px)  { .stage-grid { grid-template-columns: 1fr !important; } }
.stage-col-head {
  display: flex; align-items: center; gap: 7px; padding: 9px 13px;
  border-radius: var(--radius) var(--radius) 0 0;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase; color: #fff; margin-bottom: 8px;
}
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-left: 3px solid; border-radius: var(--radius);
  padding: 11px 13px; position: relative;
  transition: transform var(--tr), box-shadow var(--tr);
}
.card:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.18); }
.card.live { background: var(--bg3); }
.card.past { opacity: .42; }
.card-time {
  font-size: 10px; font-weight: 600; letter-spacing: .07em; color: var(--text3);
  margin-bottom: 5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.live-dot { display: inline-block; width: 5px; height: 5px; background: #22dd88; border-radius: 50%; animation: blink 1.3s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.fmt-pill { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; padding: 1px 5px; border-radius: 3px; background: var(--bg3); color: var(--text3); }
.card-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 5px; padding-right: 52px; }
.card-speaker { font-size: 11px; color: var(--text2); margin-bottom: 6px; line-height: 1.3; }
.track-pill { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; border: 1px solid; }
.track-policy  { color: #fff;      border-color: rgba(75,3,70,.7);      background: #4B0346; }
.track-markets { color: #fff;      border-color: rgba(255,81,57,.7);    background: #FF5139; }
.track-futures { color: #4B0346;   border-color: rgba(198,83,184,.5);   background: #F0A0E0; }
.track-impact  { color: #4B0346;   border-color: rgba(240,160,224,.6);  background: #FAD4F4; }
.track-none    { color: var(--text3); border-color: var(--border);      background: transparent; }
.conflict-dot { font-size: 11px; color: var(--accent); }
.no-sessions { padding: 20px; text-align: center; font-size: 12px; color: var(--text3); }
.card-icon-row {
  position: absolute; top: 9px; right: 9px;
  display: flex; gap: 6px; align-items: center;
}
.card-icon-btn {
  background: none; border: none; font-size: 16px; line-height: 1;
  color: var(--text3); cursor: pointer; padding: 4px 6px;
  transition: color var(--tr), transform var(--tr);
  min-width: 32px; min-height: 32px; display: inline-flex; align-items: center; justify-content: center;
}
.info-modal-meta { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.info-modal-speaker { font-size: 12px; color: var(--text2); margin: 8px 0 12px; line-height: 1.4; }
.info-modal-desc { font-size: 13px; color: var(--text); line-height: 1.6; max-height: 50vh; overflow-y: auto; }
.card.clickable { cursor: pointer; }
.card.clickable:active { opacity: .85; }
.card-info-hint { margin-top: 8px; font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; gap: 3px; transition: color var(--tr); }
.card.clickable:hover .card-info-hint { color: var(--accent-text); }
.card-icon-btn.fav-on { color: var(--accent); }
.card-icon-btn.note-on { color: var(--accent); }
.note-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center;
  padding: 20px; overflow-y: auto;
}
.note-modal-overlay.open { display: flex; }
.note-modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; width: 100%; max-width: 500px;
  padding: 22px; display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  margin-top: 12px; margin-bottom: 20px;
}
@media (min-width: 600px) { .note-modal-overlay { align-items: center; } .note-modal { margin-top: 0; } }
.note-modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.note-modal-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; flex: 1; }
.note-modal-close { font-size: 18px; color: var(--text3); cursor: pointer; flex-shrink: 0; transition: var(--tr); background: none; border: none; font-family: inherit; }
.note-modal-close:hover { color: var(--text); }
.note-textarea {
  width: 100%; height: 120px; min-height: 80px; max-height: 200px; resize: none;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 16px;
  color: var(--text); line-height: 1.5; transition: border-color var(--tr);
}
@media (min-width: 600px) { .note-textarea { height: 140px; font-size: 13px; resize: vertical; max-height: none; } }
.note-textarea:focus { outline: none; border-color: var(--accent); }
.note-textarea::placeholder { color: var(--text3); }
.note-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.note-save-btn { padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--tr); }
.note-save-btn:hover { opacity: .88; }
.note-delete-btn { padding: 8px 14px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: var(--tr); }
.note-delete-btn:hover { color: var(--accent); border-color: var(--accent); }
.note-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 9px; }
.note-card-time { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: .06em; margin-bottom: 4px; }
.note-card-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
.note-card-text { font-size: 12px; color: var(--text2); line-height: 1.55; white-space: pre-wrap; }
.notes-nav-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
  border: 1px solid var(--border); font-size: 16px; color: var(--text2); transition: var(--tr);
  background: none; font-family: inherit; cursor: pointer;
  min-height: 36px; display: flex; align-items: center;
}
.notes-nav-btn.has-notes { border-color: var(--accent-text); color: var(--accent-text); }
.notes-download-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: var(--tr); display: inline-flex; align-items: center; gap: 6px; }
.notes-download-btn:hover { border-color: var(--accent-text); color: var(--accent-text); }
.favs-view { padding: 20px 22px 60px; }
.conflict-banner { background: rgba(255,81,57,.1); border: 1px solid rgba(255,81,57,.3); border-radius: var(--radius); padding: 12px 16px; font-size: 12px; color: var(--accent); margin-bottom: 16px; display: flex; gap: 8px; }
.conflict-group { border: 2px solid var(--accent); border-radius: calc(var(--radius) + 2px); overflow: hidden; margin-bottom: 10px; }
.conflict-group-header { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
.conflict-group-cards { display: flex; flex-direction: column; gap: 1px; background: var(--accent); }
.conflict-group-cards .card { border-radius: 0; border: none; border-left: 3px solid; margin: 0; }
.favs-day-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); padding: 16px 0 8px; border-top: 1px solid var(--border); margin-top: 4px; }
.favs-day-label:first-child { border-top: none; padding-top: 0; }
.favs-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.favs-empty-icon { font-size: 36px; margin-bottom: 10px; }
.favs-cards { display: flex; flex-direction: column; gap: 9px; }
.mob-header { display: none; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
.mob-top { display: flex; align-items: center; padding: 12px 16px; gap: 10px; }
.mob-logo { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; flex: 1; }
.mob-logo span { color: var(--accent); }
.mob-clock { font-size: 13px; color: var(--text3); }
.mob-theme-btn { font-size: 20px; padding: 6px 10px; border-radius: 8px; color: var(--text2); min-width: 40px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
.mob-day-tabs { display: flex; padding: 0 12px 10px; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.mob-day-tabs::-webkit-scrollbar { display: none; }
.mob-day-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); font-size: 13px; font-weight: 500; color: var(--text2); transition: var(--tr); min-height: 36px; }
.mob-day-tab.active { background: var(--violet); border-color: var(--violet); color: #fff; font-weight: 700; }
.mob-fav-tab { margin-left: auto; flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 16px; color: var(--text2); transition: var(--tr); min-height: 36px; display: flex; align-items: center; }
.mob-fav-tab.has-favs { border-color: var(--accent-text); color: var(--accent-text); }
.mob-stage-nav { display: none; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 14px; align-items: center; gap: 10px; position: sticky; top: 98px; z-index: 150; }
.stage-arrow { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); font-size: 22px; color: var(--text2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: var(--tr); }
.stage-arrow:hover { color: var(--text); border-color: var(--accent); }
.stage-arrow:disabled { opacity: .3; pointer-events: none; }
.stage-nav-center { flex: 1; text-align: center; }
.stage-nav-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; }
.stage-nav-hint { font-size: 10px; color: var(--text3); margin-top: 2px; }
.stage-nav-dots { display: flex; justify-content: center; gap: 5px; margin-top: 5px; }
.stage-nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: var(--tr); }
.stage-nav-dot.active { transform: scale(1.4); }
.mob-sessions-wrap { display: none; overflow: hidden; width: 100%; }
.mob-swipe-track { display: flex; transition: transform .28s cubic-bezier(.4,0,.2,1); will-change: transform; }
.mob-stage-panel { flex-shrink: 0; padding: 14px 14px 80px; display: flex; flex-direction: column; gap: 9px; }
@media (max-width: 900px) { .sidebar, .main-area { display: none !important; } .mob-header { display: block; } .mob-stage-nav { display: flex; } .mob-sessions-wrap { display: block; } }
@media (min-width: 901px) { .mob-header, .mob-stage-nav, .mob-sessions-wrap, .mob-favs-view { display: none !important; } }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media print {
  body > *:not(#print-container) { display: none !important; }
  #print-container { display: block !important; }
  .print-note-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ccc; border-left: 3px solid; border-radius: 6px; padding: 12px 14px; margin-bottom: 12px; background: #fff; }
  .print-day-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #666; padding: 16px 0 8px; border-top: 1px solid #ddd; margin-top: 4px; }
  .print-day-label:first-child { border-top: none; padding-top: 0; }
}
.contact-icons { display: flex; align-items: center; gap: 6px; }
.contact-icon-btn { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); text-decoration: none; transition: var(--tr); flex-shrink: 0; }
.contact-icon-btn:hover { border-color: var(--accent-text); color: var(--accent-text); }
.contact-icon-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-eyebrow">GCES 2026</div>
    <div class="logo-name">German Creative<br>Economy Summit</div>
    <div class="logo-sub">28.–29. April · Kampnagel</div>
  </div>
  <div class="sb-section">
    <div class="sb-label">Tag</div>
    <button class="sb-btn active" id="d-day-0" onclick="setDay(0)">Di, 28. April</button>
    <button class="sb-btn" id="d-day-1" onclick="setDay(1)">Mi, 29. April</button>
    <button class="sb-btn" id="d-day-fav" onclick="showFavs()">&#9829; Meine Favoriten</button>
    <button class="sb-btn" id="d-day-notes" onclick="showNotesView()">&#9998; Meine Notizen</button>
  </div>
  <div class="sb-section">
    <div class="sb-label">Stages</div>
    <button class="sb-btn active" id="d-st-all"     onclick="setStage('all')"><span class="sb-dot" style="background:var(--text3)"></span>Alle Stages</button>
    <button class="sb-btn" id="d-st-K6"      onclick="setStage('K6')"><span class="sb-dot" style="background:var(--c-k6)"></span>K6 Main Stage</button>
    <button class="sb-btn" id="d-st-K4"      onclick="setStage('K4')"><span class="sb-dot" style="background:var(--c-k4)"></span>K4</button>
    <button class="sb-btn" id="d-st-K2"      onclick="setStage('K2')"><span class="sb-dot" style="background:var(--c-k2)"></span>K2</button>
    <button class="sb-btn" id="d-st-P1"      onclick="setStage('P1')"><span class="sb-dot" style="background:var(--c-p1)"></span>P1 Workshop</button>
    <button class="sb-btn" id="d-st-Foyer"   onclick="setStage('Foyer')"><span class="sb-dot" style="background:var(--c-foyer)"></span>Foyer</button>
    <button class="sb-btn" id="d-st-Alabama" onclick="setStage('Alabama')"><span class="sb-dot" style="background:var(--c-alabama)"></span>Alabama Kino</button>
  </div>
  <div class="sb-section">
    <div class="sb-label">Tracks</div>
    <button class="track-btn active" data-track="Policy" onclick="toggleTrack('Policy')"><span style="width:6px;height:6px;border-radius:50%;background:var(--c-policy);flex-shrink:0"></span>Policy<span class="tck">✓</span></button>

let currentDay=0, currentStage='all', viewingFavs=false, viewingNotes=false, mobileStageIdx=0;
let activeTracks=new Set(['Policy','Markets','Futures','Impact']);

let notes=JSON.parse(localStorage.getItem('gces26_notes')||'{}');

function toMins(s){const[h,m]=s.split(':').map(Number);return h*60+m;}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function todayStr(){return new Date().toISOString().slice(0,10);}
function isLive(s){if(EVENT_DATES[s.day]!==todayStr())return false;const nm=nowMins();return nm>=toMins(s.start)&&nm<toMins(s.end);}
function isPast(s){if(EVENT_DATES[s.day]>todayStr())return false;if(EVENT_DATES[s.day]<todayStr())return true;return nowMins()>=toMins(s.end);}
function stageColor(id){return(STAGES.find(s=>s.id===id)||{}).color||'#888';}
function trkCls(t){return{Policy:'track-policy',Markets:'track-markets',Futures:'track-futures',Impact:'track-impact'}[t]||'track-none';}
function trkLabel(t){return{Policy:'Policy',Markets:'Markets & Capital',Futures:'Creative Futures',Impact:'Impact'}[t]||'';}
function saveFavs(){localStorage.setItem('gces26_favs',JSON.stringify([...favorites]));}
function saveNotes(){localStorage.setItem('gces26_notes',JSON.stringify(notes));}
function hasConflict(id){
  if(!favorites.has(id))return false;
  const s=SESSIONS.find(x=>x.id===id);if(!s)return false;
  return SESSIONS.some(o=>o.id!==id&&favorites.has(o.id)&&o.day===s.day&&toMins(s.start)<toMins(o.end)&&toMins(o.start)<toMins(s.end));
}
function allConflicts(){
  const fs=SESSIONS.filter(s=>favorites.has(s.id)),out=[];
  for(let i=0;i<fs.length;i++)for(let j=i+1;j<fs.length;j++){
    const a=fs[i],b=fs[j];
    if(a.day===b.day&&toMins(a.start)<toMins(b.end)&&toMins(b.start)<toMins(a.end))out.push([a,b]);
  }
  return out;
}
function notesCount(){return Object.values(notes).filter(v=>v&&v.trim()).length;}

function buildCard(s,showStage=false){
  const live=isLive(s),past=isPast(s),fav=favorites.has(s.id),conflict=hasConflict(s.id);
  const sc=stageColor(s.stage),tl=trkLabel(s.track);
  const si=STAGES.find(x=>x.id===s.stage);
  const desc=DESC[s.id]||'';
  const hasNote=notes[s.id]&&notes[s.id].trim();
  const clickable=!!desc;
  return `<div class="card${live?' live':''}${past?' past':''}${clickable?' clickable':''}" style="border-left-color:${sc}"${clickable?` onclick="openInfo(${s.id})"`:''}>
    <div class="card-time">
      ${live?'<span class="live-dot"></span>':''}
      ${s.start}&#8211;${s.end}
      ${s.format?`<span class="fmt-pill">${s.format}</span>`:''}
      ${showStage&&si?`<span class="fmt-pill" style="color:${si.color}">${si.label}</span>`:''}
    </div>
    <div class="card-title">${s.title}</div>
    ${s.speaker?`<div class="card-speaker">${s.speaker}</div>`:''}
    ${tl?`<span class="track-pill ${trkCls(s.track)}">${tl}</span>`:''}
    ${conflict?`<span class="conflict-dot" title="Zeitkonflikt">&#9889;</span>`:''}
    <div class="card-icon-row">
      <button class="card-icon-btn${fav?' fav-on':''}" onclick="event.stopPropagation();toggleFav(${s.id})" title="${fav?'Favorit entfernen':'Zu Favoriten hinzufügen'}">${fav?'&#9829;':'&#9825;'}</button>
      <button class="card-icon-btn${hasNote?' note-on':''}" onclick="event.stopPropagation();openNote(${s.id})" title="Notiz">&#9998;</button>
    </div>
    ${clickable?`<div class="card-info-hint">Mehr Info &#8250;</div>`:''}
  </div>`;
}

function openInfo(sessionId){
  const s=SESSIONS.find(x=>x.id===sessionId);if(!s)return;
  const si=STAGES.find(x=>x.id===s.stage);
  const sc=stageColor(s.stage);
  document.getElementById('info-modal-meta').innerHTML=`<span style="color:${sc}">${si?si.label:s.stage}</span> &nbsp;·&nbsp; ${s.start}&#8211;${s.end} &nbsp;·&nbsp; ${s.format||''}`;
  document.getElementById('info-modal-title').textContent=s.title;
  const speakerEl=document.getElementById('info-modal-speaker');
  speakerEl.textContent=s.speaker||'';
  speakerEl.style.display=s.speaker?'':'none';
  document.getElementById('info-modal-desc').textContent=DESC[s.id]||'';
  document.getElementById('info-modal').classList.add('open');
}
function closeInfo(){document.getElementById('info-modal').classList.remove('open');}

function openNote(sessionId){
  const s=SESSIONS.find(x=>x.id===sessionId);if(!s)return;
  const modal=document.getElementById('note-modal');
  document.getElementById('note-modal-title').textContent=s.title;
  document.getElementById('note-textarea').value=notes[sessionId]||'';
  modal.dataset.sid=sessionId;
  modal.classList.add('open');
  document.getElementById('note-textarea').focus();
  document.getElementById('note-delete-btn').style.display=notes[sessionId]?'inline-block':'none';
}
function closeNote(){document.getElementById('note-modal').classList.remove('open');}
function saveNote(){
  const modal=document.getElementById('note-modal');
  const sid=parseInt(modal.dataset.sid);
  const val=document.getElementById('note-textarea').value.trim();
  if(val)notes[sid]=val;else delete notes[sid];
  saveNotes();closeNote();updateNotesUI();renderAll();
}
function deleteNote(){
  const modal=document.getElementById('note-modal');
  const sid=parseInt(modal.dataset.sid);
  delete notes[sid];saveNotes();closeNote();updateNotesUI();renderAll();
}
function updateNotesUI(){
  const n=notesCount();
  document.querySelectorAll('.notes-nav-btn').forEach(b=>{
    b.innerHTML=n>0?`&#9998; ${n}`:'&#9998;';
    b.classList.toggle('has-notes',n>0);
  });
}

function showNotesView(mobile=false){
  viewingFavs=false;viewingNotes=true;
  document.getElementById('d-grid').style.display='none';
  document.getElementById('d-favs-view').style.display='none';
  document.getElementById('d-notes-view').style.display='';
  document.getElementById('mob-sessions-wrap').style.display='none';
  document.getElementById('mob-stage-nav').style.display='none';
  document.getElementById('m-favs-view').style.display='none';
  document.getElementById('m-notes-view').style.display='';
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mob-day-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-day-label').textContent='Meine Notizen';
  document.getElementById('d-stage-label').textContent='';
  renderNotesView('d-notes-list');renderNotesView('m-notes-list');
}

function renderNotesView(listId){
  const el=document.getElementById(listId);if(!el)return;
  const sessionNotes=SESSIONS.filter(s=>notes[s.id]&&notes[s.id].trim()).sort((a,b)=>a.day-b.day||toMins(a.start)-toMins(b.start));
  if(!sessionNotes.length){
    el.innerHTML=`<div class="favs-empty"><div class="favs-empty-icon">&#9998;</div><div>Noch keine Notizen.<br>Tippe auf &#9998; bei einer Session.</div></div>`;return;
  }
  let html='',lastDay=-1;
  for(const s of sessionNotes){
    if(s.day!==lastDay){html+=`<div class="favs-day-label">${s.day===0?'Dienstag, 28. April':'Mittwoch, 29. April'}</div>`;lastDay=s.day;}
    const sc=stageColor(s.stage);
    html+=`<div class="note-card clickable" style="border-left-color:${sc};cursor:pointer" onclick="openNote(${s.id})">
      <div class="note-card-time">${s.start}&#8211;${s.end} &middot; ${STAGES.find(x=>x.id===s.stage)?.label||s.stage}</div>
      <div class="note-card-title">${s.title}</div>
      <div class="note-card-text">${notes[s.id].replace(/\n/g,'<br>')}</div>
      <div class="card-icon-row" style="position:static;margin-top:8px;justify-content:flex-end"><button class="card-icon-btn note-on" onclick="event.stopPropagation();openNote(${s.id})" title="Bearbeiten">&#9998;</button></div>
    </div>`;
  }
  el.innerHTML=html;
}

function renderDesktop(){
  const grid=document.getElementById('stage-grid');if(!grid)return;
  const stages=currentStage==='all'?STAGES:STAGES.filter(s=>s.id===currentStage);
  grid.setAttribute('data-cols',stages.length);
  let html='';
  for(const stage of stages){
    const sessions=SESSIONS.filter(s=>s.day===currentDay&&s.stage===stage.id&&(activeTracks.has(s.track)||s.track==='')).sort((a,b)=>toMins(a.start)-toMins(b.start));
    html+=`<div>
      <div class="stage-col-head" style="background:${stage.color}18;border:1px solid ${stage.color}40">
        <span style="width:7px;height:7px;border-radius:50%;background:${stage.color}"></span>${stage.label}
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${sessions.length?sessions.map(s=>buildCard(s)).join(''):'<div class="no-sessions">Keine Sessions</div>'}
      </div>
    </div>`;
  }
  grid.innerHTML=html;
}

function renderMobile(){
  const track=document.getElementById('mob-swipe-track');
  const dots=document.getElementById('m-stage-dots');
  const name=document.getElementById('m-stage-name');
  const prev=document.getElementById('m-arrow-prev');
  const next=document.getElementById('m-arrow-next');
  if(!track)return;
  let html='';
  for(const stage of STAGES){
    const sessions=SESSIONS.filter(s=>s.day===currentDay&&s.stage===stage.id).sort((a,b)=>toMins(a.start)-toMins(b.start));
    html+=`<div class="mob-stage-panel" style="width:${100/STAGES.length}%">
      ${sessions.length?sessions.map(s=>buildCard(s)).join(''):'<div class="no-sessions">Keine Sessions</div>'}
    </div>`;
  }
  track.innerHTML=html;
  track.style.width=`${STAGES.length*100}%`;
  track.style.transform=`translateX(-${mobileStageIdx*(100/STAGES.length)}%)`;
  const cur=STAGES[mobileStageIdx];
  name.textContent=cur.label;name.style.color=cur.color;
  dots.innerHTML=STAGES.map((s,i)=>`<div class="stage-nav-dot${i===mobileStageIdx?' active':''}" style="${i===mobileStageIdx?'background:'+s.color:''}"></div>`).join('');
  prev.disabled=mobileStageIdx===0;next.disabled=mobileStageIdx===STAGES.length-1;
}

function mobileStep(dir){mobileStageIdx=Math.max(0,Math.min(STAGES.length-1,mobileStageIdx+dir));renderMobile();}

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(viewingFavs)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45)mobileStep(dx<0?1:-1);
},{passive:true});

function toggleFav(id){favorites.has(id)?favorites.delete(id):favorites.add(id);saveFavs();updateFavUI();renderAll();}
function updateFavUI(){
  const n=favorites.size;
  const db=document.getElementById('d-fav-btn');const mt=document.getElementById('m-fav-tab');
  if(db){db.innerHTML=n>0?`&#9829; Favoriten (${n})`:'&#9829; Favoriten';db.classList.toggle('has-favs',n>0);}
  if(mt){mt.innerHTML=n>0?`&#9829; ${n}`:'&#9825;';mt.classList.toggle('has-favs',n>0);}
}

function renderFavs(listId,bannerId,textId){
  const list=document.getElementById(listId);const banner=document.getElementById(bannerId);if(!list)return;
  const fs=SESSIONS.filter(s=>favorites.has(s.id)).sort((a,b)=>a.day-b.day||toMins(a.start)-toMins(b.start));
  if(!fs.length){list.innerHTML='<div class="favs-empty"><div class="favs-empty-icon">&#9825;</div><div>Noch keine Favoriten –<br>tippe auf &#9825; bei einer Session.</div></div>';banner.style.display='none';return;}
  const conflicts=allConflicts();
  banner.style.display='none';
  const conflictingIds=new Set(conflicts.flatMap(([a,b])=>[a.id,b.id]));
  const groups=[];
  for(const [a,b] of conflicts){
    let found=null;
    for(const g of groups){if(g.has(a.id)||g.has(b.id)){found=g;break;}}
    if(found){found.add(a.id);found.add(b.id);}else groups.push(new Set([a.id,b.id]));
  }
  const days=[0,1];let html='';
  for(const day of days){
    const daySessions=fs.filter(s=>s.day===day);if(!daySessions.length)continue;
    html+=`<div class="favs-day-label">${day===0?'Dienstag, 28. April':'Mittwoch, 29. April'}</div>`;
    const dayConflictGroups=groups.map(g=>{const members=fs.filter(s=>s.day===day&&g.has(s.id)).sort((a,b)=>toMins(a.start)-toMins(b.start));return members;}).filter(m=>m.length>0);
    const rendered=new Set();
    for(const s of daySessions){
      if(rendered.has(s.id))continue;
      const group=dayConflictGroups.find(g=>g.some(m=>m.id===s.id));
      if(group){
        html+=`<div class="conflict-group"><div class="conflict-group-header">&#9889; Zeitkonflikt – eine Session auswählen</div><div class="conflict-group-cards">${group.map(m=>{rendered.add(m.id);return buildCard(m,true);}).join('')}</div></div>`;
      }else{html+=buildCard(s,true);rendered.add(s.id);}
    }
  }
  list.innerHTML=html;
}

function showFavs(mobile=false){
  viewingFavs=true;viewingNotes=false;
  document.getElementById('d-grid').style.display='none';
  document.getElementById('d-favs-view').style.display='';
  document.getElementById('d-notes-view').style.display='none';
  document.getElementById('mob-sessions-wrap').style.display='none';
  document.getElementById('mob-stage-nav').style.display='none';
  document.getElementById('m-favs-view').style.display='';
  document.getElementById('m-notes-view').style.display='none';
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-day-fav')?.classList.add('active');
  document.querySelectorAll('.mob-day-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-day-label').textContent='Meine Favoriten';
  document.getElementById('d-stage-label').textContent='';
  renderFavs('d-favs-list','d-conflict-banner','d-conflict-text');
  renderFavs('m-favs-list','m-conflict-banner','m-conflict-text');
}

function setDay(day,mobile=false){
  currentDay=day;viewingFavs=false;viewingNotes=false;mobileStageIdx=0;
  document.getElementById('d-grid').style.display='';
  document.getElementById('d-favs-view').style.display='none';
  document.getElementById('d-notes-view').style.display='none';
  document.getElementById('mob-sessions-wrap').style.display='';
  document.getElementById('mob-stage-nav').style.display='flex';
  document.getElementById('m-favs-view').style.display='none';
  document.getElementById('m-notes-view').style.display='none';
  ['d-day-0','d-day-1','d-day-fav'].forEach((id,i)=>document.getElementById(id)?.classList.toggle('active',i===day));
  ['m-day-0','m-day-1'].forEach((id,i)=>document.getElementById(id)?.classList.toggle('active',i===day));
  document.getElementById('d-day-label').textContent=day===0?'Di, 28. April 2026':'Mi, 29. April 2026';
  renderAll();
}

function setStage(id){
  currentStage=id;
  document.querySelectorAll('[id^="d-st-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-st-'+(id==='all'?'all':id))?.classList.add('active');
  const s=STAGES.find(x=>x.id===id);
  document.getElementById('d-stage-label').textContent=s?'— '+s.label:'';
  renderDesktop();
}

function toggleTrack(key){
  if(activeTracks.has(key)){if(activeTracks.size>1)activeTracks.delete(key);}else activeTracks.add(key);
  document.querySelectorAll('.track-btn').forEach(b=>b.classList.toggle('active',activeTracks.has(b.dataset.track)));
  renderDesktop();
}

function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('gces26_theme',isDark?'light':'dark');
}

function updateClock(){
  const n=new Date(),s=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const sc=document.getElementById('sb-clock'),mc=document.getElementById('m-clock');
  if(sc)sc.textContent=s;if(mc)mc.textContent=s;
}

function renderAll(){
  if(viewingNotes){renderNotesView('d-notes-list');renderNotesView('m-notes-list');updateFavUI();updateNotesUI();return;}
  if(viewingFavs){renderFavs('d-favs-list','d-conflict-banner','d-conflict-text');renderFavs('m-favs-list','m-conflict-banner','m-conflict-text');updateFavUI();updateNotesUI();return;}
  renderDesktop();renderMobile();updateFavUI();updateNotesUI();
}

function downloadNotesPDF(){
  const sessionNotes=SESSIONS.filter(s=>notes[s.id]&&notes[s.id].trim()).sort((a,b)=>a.day-b.day||toMins(a.start)-toMins(b.start));
  if(!sessionNotes.length){alert('Noch keine Notizen vorhanden.');return;}
  let html='',lastDay=-1;
  for(const s of sessionNotes){
    if(s.day!==lastDay){html+=`<div class="print-day-label">${s.day===0?'Dienstag, 28. April':'Mittwoch, 29. April'}</div>`;lastDay=s.day;}
    const sc=stageColor(s.stage);const stageName=STAGES.find(x=>x.id===s.stage)?.label||s.stage;
    const noteText=notes[s.id].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    html+=`<div class="print-note-card" style="border-left-color:${sc}">
      <div style="font-size:10px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">${s.start}&#8211;${s.end} &middot; ${stageName}</div>
      <div style="font-size:14px;font-weight:600;color:#000;margin-bottom:8px;line-height:1.4">${s.title}</div>
      ${s.speaker?`<div style="font-size:12px;color:#555;margin-bottom:8px">${s.speaker}</div>`:''}
      <div style="font-size:13px;color:#222;line-height:1.6">${noteText}</div>
    </div>`;
  }
  document.getElementById('print-notes-content').innerHTML=html;
  document.getElementById('print-container').style.display='block';
  window.print();
  document.getElementById('print-container').style.display='none';
}

const savedTheme=localStorage.getItem('gces26_theme');
if(savedTheme)document.documentElement.setAttribute('data-theme',savedTheme);
updateClock();
setInterval(updateClock,15000);
setInterval(renderAll,60000);
const autoDay=EVENT_DATES.indexOf(new Date().toISOString().slice(0,10));
if(autoDay!==-1)setDay(autoDay);else renderAll();
updateNotesUI();
</script>
